<!-- templates/login.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>
    <h1>Login via Clerk</h1>
    <form method="post">
        <label for="user_id">User ID:</label><br>
        <input type="text" id="user_id" name="user_id" required><br><br>
        <label for="bearer_token">Bearer Token:</label><br>
        <input type="text" id="bearer_token" name="bearer_token" required><br><br>
        <button type="submit">Login</button>
    </form>
</body>
</html>
